name: Build plugin zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP (for Composer)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Composer dependencies (no-dev)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Create zip (include vendor)
        run: |
          PLUGIN_SLUG="wp_status_api"
          ZIP_NAME="${PLUGIN_SLUG}-${GITHUB_REF_NAME}.zip"
          mkdir -p dist
          zip -r "dist/${ZIP_NAME}" . \
            -x ".git/*" ".github/*" "node_modules/*" "coverage/*" "tmp/*" "temp/*"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ZIP_NAME }}

